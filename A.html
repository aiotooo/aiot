<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AIoT 2049 · 神经场域 | 未来物联</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* 隐藏默认光标，使用自定义 */
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #01050f;
            color: #eef5ff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* 深邃背景基底 */
        .bg-base {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 50%, #030b1a, #000000);
            z-index: -3;
        }

        /* Canvas 神经脉络画布，跟随鼠标扰动 */
        #neuralCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: -2;
            pointer-events: none; /* 让鼠标事件穿透，但光标仍可捕捉 */
        }

        /* 微光晕滤镜 */
        .ambient-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 120, 200, 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* 主容器 */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 6%;
            position: relative;
            z-index: 5;
        }

        /* 导航栏 - 极简未来感 */
        .nav-bar {
            display: flex;
            justify-content: flex-end;
            padding: 2rem 0 1rem;
            gap: 2rem;
            letter-spacing: 1px;
        }
        .nav-item {
            font-size: 0.85rem;
            font-weight: 400;
            color: #bbddff;
            transition: 0.2s;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }
        .nav-item:hover {
            color: white;
            border-bottom-color: #0af;
            text-shadow: 0 0 5px #0af;
        }

        /* Hero 区域 未来感宣言 */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .badge {
            background: rgba(0, 170, 255, 0.12);
            backdrop-filter: blur(6px);
            display: inline-block;
            width: fit-content;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            border: 1px solid rgba(0, 200, 255, 0.4);
            margin-bottom: 1.2rem;
            letter-spacing: 2px;
        }
        .hero h1 {
            font-size: 4.8rem;
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff, #84c9ff, #2a7fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.2rem;
            max-width: 520px;
            color: #b0d4ff;
            margin-bottom: 2rem;
        }
        .future-tag {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .chip {
            background: rgba(10, 30, 50, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            font-size: 0.8rem;
            border: 0.5px solid rgba(0, 180, 255, 0.5);
        }

        /* 邮箱区域 */
        .email-zone {
            margin: 3rem 0 4rem;
            display: flex;
            justify-content: center;
        }
        .glass-email {
            background: rgba(0, 20, 35, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 0.9rem 2.2rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .glass-email i {
            color: #0af;
            font-size: 1.3rem;
        }
        .copy-mail {
            background: none;
            border: none;
            color: #0af;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        /* 点击动画class */
        .click-effect {
            animation: gentlePulse 0.25s ease-out;
        }
        @keyframes gentlePulse {
            0% { transform: scale(1); text-shadow: 0 0 0px #0af; }
            50% { transform: scale(1.02); text-shadow: 0 0 10px #0af; background: rgba(0,170,255,0.2); border-radius: 80px; }
            100% { transform: scale(1); text-shadow: 0 0 0px; }
        }

        /* 高科技光标 */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #0af;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: 0.05s linear;
            background: rgba(0, 170, 255, 0.15);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 8px rgba(0, 170, 255, 0.6);
        }
        .cursor-dot {
            width: 4px;
            height: 4px;
            background: #0af;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: 0.02s linear;
        }

        /* 页脚简约 */
        footer {
            text-align: center;
            padding: 2rem 0;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
            margin-top: 2rem;
        }

        @media (max-width: 800px) {
            .hero h1 { font-size: 2.5rem; }
            .glass-email { font-size: 0.9rem; padding: 0.6rem 1.2rem; }
        }

        /* 滚动条科技感 */
        ::-webkit-scrollbar {
            width: 5px;
            background: #020c17;
        }
        ::-webkit-scrollbar-thumb {
            background: #0af;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="bg-base"></div>
<canvas id="neuralCanvas"></canvas>
<div class="ambient-glow"></div>

<!-- 自定义光标 -->
<div class="custom-cursor" id="customCursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div class="container">
    <div class="nav-bar">
        <span class="nav-item">∞ 神经场</span>
        <span class="nav-item">· 意识物联 ·</span>
        <span class="nav-item">Q 超感协议</span>
    </div>

    <div class="hero">
        <div class="badge">
            <i class="fas fa-microchip"></i> AIoT · 未来已来
        </div>
        <h1>神经脉络物联网<br>涌现智域</h1>
        <p>亿万传感器如神经突触，人工智能重塑万物边界。超越连接，进入感知共生的新纪元。</p>
        <div class="future-tag">
            <span class="chip"><i class="fas fa-brain"></i> 边缘觉醒</span>
            <span class="chip"><i class="fas fa-waveform"></i> 全息数据流</span>
            <span class="chip"><i class="fas fa-infinity"></i> 量子协同</span>
        </div>
    </div>

    <!-- 邮箱简约模块，只展示邮箱+复制交互 -->
    <div class="email-zone">
        <div class="glass-email" id="emailCard">
            <i class="fas fa-envelope"></i>
            <span>team@aiot.ooo</span>
            <button class="copy-mail" id="copyEmailBtn"><i class="far fa-copy"></i></button>
        </div>
    </div>

    <footer>
        <i class="fas fa-map-marker-alt"></i> 香港 · 全球AIoT神经中枢 | 想象重构现实
    </footer>
</div>

<script>
    (function() {
        // ---------- 隐藏 F12 / 开发者工具快捷键 ----------
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // ---------- 神经脉络 Canvas 背景（类似 aiot.hk 风格，鼠标扰动避让/跟随）----------
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let points = [];
        const POINT_COUNT = 80;        // 节点数量适中，线条丰富
        const EDGE_DIST = 180;          // 连线最大距离
        const MOUSE_RADIUS = 110;        // 鼠标影响半径，避开/推离
        let mouseX = -1000, mouseY = -1000;
        
        // 初始化节点
        function initPoints() {
            points = [];
            for (let i = 0; i < POINT_COUNT; i++) {
                points.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    baseX: 0, baseY: 0 // 用于稍微记忆原始区域，增加多样性
                });
            }
        }
        
        // 更新画布尺寸
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initPoints();
        }
        
        // 更新节点位置: 增加鼠标排斥（避开鼠标），并且有边界弹性 + 平滑运动
        function updatePoints() {
            for (let p of points) {
                // 鼠标斥力: 方向远离鼠标
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.hypot(dx, dy);
                if (dist < MOUSE_RADIUS && dist > 0.5) {
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS; // 0~1 斥力强度
                    const angle = Math.atan2(dy, dx);
                    const repelX = Math.cos(angle) * force * 1.2;
                    const repelY = Math.sin(angle) * force * 1.2;
                    p.vx += repelX;
                    p.vy += repelY;
                }
                
                // 轻微的随机漂移，让网络更加生动（类似神经躁动）
                p.vx += (Math.random() - 0.5) * 0.08;
                p.vy += (Math.random() - 0.5) * 0.08;
                
                // 阻尼
                p.vx *= 0.96;
                p.vy *= 0.96;
                
                // 更新位置
                p.x += p.vx;
                p.y += p.vy;
                
                // 边界反弹 + 柔和边界效应
                if (p.x < 10) { p.x = 10; p.vx *= -0.5; }
                if (p.x > width - 10) { p.x = width - 10; p.vx *= -0.5; }
                if (p.y < 10) { p.y = 10; p.vy *= -0.5; }
                if (p.y > height - 10) { p.y = height - 10; p.vy *= -0.5; }
            }
        }
        
        // 绘制神经脉络: 线条 + 光点
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            
            // 半透明拖尾效果，增加科技拖影
            ctx.fillStyle = 'rgba(1, 5, 15, 0.18)';
            ctx.fillRect(0, 0, width, height);
            
            // 先绘制连线（发光效果）
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (dist < EDGE_DIST) {
                        // 透明度随距离变化
                        let alpha = (1 - dist / EDGE_DIST) * 0.55;
                        // 鼠标附近连线强化效果
                        const midX = (p1.x + p2.x)/2;
                        const midY = (p1.y + p2.y)/2;
                        const mouseDist = Math.hypot(midX - mouseX, midY - mouseY);
                        if (mouseDist < MOUSE_RADIUS) alpha += 0.2;
                        alpha = Math.min(alpha, 0.85);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(0, 170, 255, ${alpha})`;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }
                }
            }
            
            // 绘制节点（光晕核心）
            for (let p of points) {
                // 动态光晕
                const gradient = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, 9);
                gradient.addColorStop(0, '#0af');
                gradient.addColorStop(1, 'rgba(0, 100, 200, 0)');
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                // 内核心
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fillStyle = '#b0ffff';
                ctx.fill();
            }
            
            // 额外增加流动粒子线条 (微小粒子浮游)
            for (let i = 0; i < points.length; i+=2) {
                const p = points[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 200, 255, 0.7)`;
                ctx.fill();
            }
        }
        
        // 动画循环
        let animationId;
        function animate() {
            updatePoints();
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // 鼠标移动事件（记录坐标，使神经避开或跟随附近扰动）
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            // 同时也让光标移动配合
        });
        
        // 窗口改变重置
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        resizeCanvas();
        animate();
        
        // ---------- 自定义光标（好看的高科技光标，避开鼠标实际指针隐藏）----------
        const cursor = document.getElementById('customCursor');
        const cursorDot = document.getElementById('cursorDot');
        let mouseXCursor = 0, mouseYCursor = 0;
        document.addEventListener('mousemove', (e) => {
            mouseXCursor = e.clientX;
            mouseYCursor = e.clientY;
            cursor.style.transform = `translate(${mouseXCursor - 10}px, ${mouseYCursor - 10}px)`;
            cursorDot.style.transform = `translate(${mouseXCursor - 2}px, ${mouseYCursor - 2}px)`;
        });
        
        // 点击动画: 点击任意位置增加一个微妙的扩散环 + 对点击元素增加脉冲效果，不要太炫酷，轻柔科技感
        document.body.addEventListener('click', (e) => {
            // 创建临时扩散圆环
            const ring = document.createElement('div');
            ring.style.position = 'fixed';
            ring.style.left = `${e.clientX - 15}px`;
            ring.style.top = `${e.clientY - 15}px`;
            ring.style.width = '30px';
            ring.style.height = '30px';
            ring.style.border = '1.5px solid #0af';
            ring.style.borderRadius = '50%';
            ring.style.pointerEvents = 'none';
            ring.style.zIndex = '10001';
            ring.style.opacity = '0.8';
            ring.style.transform = 'scale(0.5)';
            ring.style.transition = 'transform 0.3s ease-out, opacity 0.4s ease-out';
            document.body.appendChild(ring);
            setTimeout(() => {
                ring.style.transform = 'scale(2)';
                ring.style.opacity = '0';
            }, 10);
            setTimeout(() => {
                ring.remove();
            }, 400);
            
            // 如果点击的是邮箱区域或复制按钮，额外添加微动画，并在复制时显示提示
            if (e.target.closest('#emailCard') || e.target.closest('#copyEmailBtn')) {
                const emailDiv = document.querySelector('.glass-email');
                if (emailDiv) {
                    emailDiv.classList.add('click-effect');
                    setTimeout(() => emailDiv.classList.remove('click-effect'), 300);
                }
            } else {
                // 为全局其他点击添加一个很微弱的全局闪烁 (不太夸张)
                const overlay = document.createElement('div');
                overlay.style.position = 'fixed';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.backgroundColor = 'rgba(0, 170, 255, 0.03)';
                overlay.style.pointerEvents = 'none';
                overlay.style.zIndex = '9998';
                overlay.style.transition = 'opacity 0.2s';
                document.body.appendChild(overlay);
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 200);
                }, 20);
            }
        });
        
        // 复制邮箱功能 & 提供提示 + 好玩但不花哨的交互
        const copyBtn = document.getElementById('copyEmailBtn');
        const emailSpan = document.querySelector('.glass-email span');
        copyBtn.addEventListener('click', async (event) => {
            event.stopPropagation();
            const email = "team@aiot.ooo";
            try {
                await navigator.clipboard.writeText(email);
                // 显示短暂复制成功反馈（科技轻提示）
                const toast = document.createElement('div');
                toast.innerText = '✓ 邮箱已复制 | 未来已连接';
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = 'rgba(0, 30, 50, 0.85)';
                toast.style.backdropFilter = 'blur(10px)';
                toast.style.border = '1px solid #0af';
                toast.style.color = '#c0eaff';
                toast.style.padding = '0.5rem 1.2rem';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.8rem';
                toast.style.zIndex = '10001';
                toast.style.fontFamily = 'monospace';
                toast.style.pointerEvents = 'none';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 1800);
                // 添加点击动画到邮箱按钮区域
                const parentCard = document.querySelector('.glass-email');
                parentCard.classList.add('click-effect');
                setTimeout(() => parentCard.classList.remove('click-effect'), 300);
            } catch (err) {
                console.warn("复制失败");
            }
        });
        
        // 可选：鼠标进入某些区域时稍微改变光标样式（不需要，已有自定义光标）
        // 让canvas背景跟随鼠标的神经避开效果已经实现，同时也带有点跟随避让
        // 增加额外微妙的鼠标光晕悬浮效果，不是炫光而是平滑
        const heroTitle = document.querySelector('.hero h1');
        if(heroTitle) {
            heroTitle.addEventListener('mouseenter', () => {
                cursor.style.borderColor = '#8cf';
                cursor.style.boxShadow = '0 0 12px #0af';
            });
            heroTitle.addEventListener('mouseleave', () => {
                cursor.style.borderColor = '#0af';
                cursor.style.boxShadow = '0 0 8px rgba(0, 170, 255, 0.6)';
            });
        }
    })();
</script>
</body>
</html>
