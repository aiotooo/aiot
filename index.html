<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIoT.ooo · 连接智能</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'SF Mono', 'Fira Code', 'Monaco', 'Cascadia Code', monospace;
      overflow: hidden;
      position: relative;
    }

    .glow-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at 50% 50%, rgba(30, 30, 35, 0.12) 0%, #000000 80%);
      animation: breathe 20s ease-in-out infinite alternate;
    }

    @keyframes breathe {
      0% { opacity: 0.3; }
      100% { opacity: 0.6; }
    }

    .glow-bg2 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at 30% 70%, rgba(40, 40, 45, 0.06) 0%, transparent 70%);
      animation: drift 25s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes drift {
      0% { opacity: 0.2; transform: translate(0, 0); }
      100% { opacity: 0.5; transform: translate(3%, 3%); }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      border-left: 2px solid #00ff9d;
      padding-left: 2rem;
    }

    h1 {
      color: #00ff9d;
      font-size: 3rem;
      margin: 0;
      letter-spacing: -0.02em;
      font-weight: 600;
      text-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
      min-height: 4rem;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clickable-title {
      display: inline-block;
      cursor: pointer;
      text-decoration: none;
      color: #00ff9d;
    }

    .clickable-title:hover {
      text-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
    }

    p {
      color: #ffffff;
      font-size: 1.2rem;
      margin-top: 0.5rem;
      font-family: inherit;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.2rem;
      background: #00ff9d;
      animation: blink 1.5s step-end infinite;
      margin-left: 6px;  /* 增加左边距，让光标和文字分开 */
      box-shadow: 0 0 5px rgba(0, 255, 157, 0.3);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="glow-bg"></div>
<div class="glow-bg2"></div>

<div class="container">
  <h1 id="typingTitle">
    <span id="clickableTitle" class="clickable-title"></span><span class="cursor" id="cursor"></span>
  </h1>
  <p id="subLine">
    <span id="subPrefix"></span><span id="subText"></span>
  </p>
</div>

<script>
(function() {
    // 目标链接简单混淆
    const _0x8d3a = ['68', '74', '74', '70', '73', '3a', '2f', '2f', '77', '77', '77', '2e', '69', '6e', '74', '75', '7a', '2e', '63', '6f', '6d', '2f'];
    let targetUrl = '';
    for (let i = 0; i < _0x8d3a.length; i++) {
        targetUrl += String.fromCharCode(parseInt(_0x8d3a[i], 16));
    }
    
    const mainText = 'AioT.ooo';
    const mainCharDelay = 180;
    
    const subSequence = [
        { type: 'char', text: '/', delay: 180 },
        { type: 'char', text: '/', delay: 180 },
        { type: 'char', text: ' ', delay: 180 },
        { type: 'char', text: '未', delay: 180 },
        { type: 'char', text: '来', delay: 180 },
        { type: 'char', text: '，', delay: 180 },
        { type: 'pause', delay: 500 },
        { type: 'char', text: '重', delay: 420 },
        { type: 'char', text: '新', delay: 420 },
        { type: 'char', text: '定', delay: 420 },
        { type: 'char', text: '义', delay: 420 }
    ];
    
    function detectDevTools() {
        let startTime = performance.now();
        debugger;
        let endTime = performance.now();
        if (endTime - startTime > 100) {
            document.body.innerHTML = '<div style="color:#00ff9d; text-align:center; margin-top:50vh;">■ ACCESS DENIED</div>';
            console.clear();
        }
    }
    
    setInterval(detectDevTools, 3000);
    
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
            (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
            e.preventDefault();
            return false;
        }
    });
    
    setInterval(function() {
        console.clear();
    }, 1000);
    
    const clickableSpan = document.getElementById('clickableTitle');
    const subPrefixSpan = document.getElementById('subPrefix');
    const subTextSpan = document.getElementById('subText');
    
    let mainIndex = 0;
    let subIndex = 0;
    let isTypingComplete = false;
    
    function typeMain() {
        if (mainIndex < mainText.length) {
            clickableSpan.textContent += mainText[mainIndex];
            mainIndex++;
            setTimeout(typeMain, mainCharDelay);
        } else {
            setTimeout(() => {
                typeSub();
            }, 600);
        }
    }
    
    function typeSub() {
        if (subIndex >= subSequence.length) {
            isTypingComplete = true;
            return;
        }
        
        const item = subSequence[subIndex];
        
        if (item.type === 'pause') {
            subIndex++;
            setTimeout(typeSub, item.delay);
        } else {
            if (subIndex < 3) {
                subPrefixSpan.textContent += item.text;
            } else {
                subTextSpan.textContent += item.text;
            }
            subIndex++;
            setTimeout(typeSub, item.delay);
        }
    }
    
    typeMain();
    
    const titleLink = document.getElementById('clickableTitle');
    titleLink.addEventListener('click', (e) => {
        e.stopPropagation();
        window.location.href = targetUrl;
    });
    
    let replaying = false;
    document.body.addEventListener('click', (e) => {
        if (e.target === titleLink || titleLink.contains(e.target)) {
            return;
        }
        if (replaying) return;
        if (isTypingComplete) {
            replaying = true;
            mainIndex = 0;
            subIndex = 0;
            isTypingComplete = false;
            clickableSpan.textContent = '';
            subPrefixSpan.textContent = '';
            subTextSpan.textContent = '';
            
            setTimeout(() => {
                typeMain();
                setTimeout(() => {
                    replaying = false;
                }, 500);
            }, 50);
        }
    });
})();
</script>
</body>
</html>
